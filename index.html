<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Princesa - 33 Fases Cósmicas</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        html, body { background:#000; width:100%; height:100%; overflow:hidden; font-family:'Courier New',monospace; }

        .screen { position:fixed; top:0; left:0; width:100%; height:100%;
                  background:linear-gradient(135deg,#1a0b2e,#4a154b);
                  display:flex; justify-content:center; align-items:center; z-index:200; }
        .screen.hidden { display:none !important; }

        .card { background:rgba(0,0,0,0.88); border-radius:50px; padding:30px;
                text-align:center; border:3px solid #ff69b4; width:90%; max-width:380px;
                box-shadow:0 0 30px rgba(255,105,180,0.4); }
        .card h1 { color:#ff69b4; font-size:26px; margin-bottom:16px; text-shadow:0 0 10px #ff69b4; }
        .card input { width:90%; padding:14px; margin:8px 0; border-radius:50px; border:none;
                      font-size:16px; text-align:center; background:#fff; }
        .card button { border:none; padding:12px 20px; margin:6px; border-radius:50px;
                       font-size:15px; font-weight:bold; cursor:pointer; transition:transform 0.1s;
                       font-family:'Courier New',monospace; }
        .card button:active { transform:scale(0.95); }
        .btn-green  { background:#44ff44; color:#000; }
        .btn-yellow { background:#ffcc00; color:#886600; }
        .btn-blue   { background:#4488ff; color:#fff; }
        .btn-red    { background:#ff4444; color:#fff; }
        .btn-orange { background:#ff8800; color:#fff; }

        .code-box { background:#111; padding:14px; border-radius:30px; margin:12px 0; border:1px solid #ff69b4; }
        .code-box span { color:#ff69b4; font-size:30px; font-weight:bold; letter-spacing:5px; }
        .waiting-status { background:#1a1a2a; padding:12px; border-radius:30px;
                          margin:12px 0; color:#ffcc44; font-size:13px; line-height:1.5; }

        /* ── JOGO ── */
        #gameContainer { position:fixed; top:0; left:0; width:100%; height:100%;
                         display:flex; flex-direction:column; background:#000; z-index:100; }
        #gameContainer.hidden { display:none !important; }

        #gameCanvas { display:block; width:100%; flex:1; min-height:0; }

        .info-panel { display:flex; justify-content:space-between; align-items:center;
                      background:#000; padding:6px 12px; color:#ffefb9; font-size:10px;
                      flex-wrap:wrap; gap:4px; border-bottom:2px solid #ff69b4; flex-shrink:0; }
        .info-panel span { background:#111; padding:2px 8px; border-radius:20px;
                           border:1px solid rgba(255,105,180,0.3); white-space:nowrap; }

        .touch-controls { display:flex; justify-content:center; gap:16px; padding:10px;
                          background:#000; border-top:2px solid #ff69b4; flex-shrink:0; }
        .gbtn { border-radius:50%; font-size:28px; border:none; cursor:pointer;
                box-shadow:0 4px 0 rgba(0,0,0,0.4); width:64px; height:64px; }
        .gbtn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,0.4); }
        .gbtn-lr   { background:radial-gradient(#ffcc77,#ffaa33); color:#6b3a00; }
        .gbtn-jump { background:radial-gradient(#ff88aa,#ff4466); color:#fff; width:72px; height:72px; }
        .gbtn-fire { background:radial-gradient(#ffaa66,#ff6600); color:#fff; width:72px; height:72px; font-size:24px; }

        @media(max-width:480px){
            .gbtn{width:52px;height:52px;font-size:22px;}
            .gbtn-jump,.gbtn-fire{width:60px;height:60px;font-size:20px;}
            .info-panel{font-size:8px;padding:4px 6px;}
            .card{padding:18px;} .card h1{font-size:22px;} .code-box span{font-size:24px;}
        }

        .controls-footer { text-align:center; padding:4px; color:#e6c88a;
                           font-size:9px; background:rgba(0,0,0,0.6); flex-shrink:0; }
        #exitBtn { position:fixed; top:8px; right:8px; background:#ff4444; color:#fff;
                   border:none; padding:7px 14px; border-radius:30px; z-index:300;
                   display:none; cursor:pointer; font-family:'Courier New',monospace; font-weight:bold; font-size:13px; }

        /* status */
        #statusBar { position:fixed; bottom:8px; left:8px; background:rgba(0,0,0,0.75);
                     color:#0f0; padding:3px 8px; border-radius:20px; font-size:9px; z-index:300; }

        /* popups */
        .popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
                 background:linear-gradient(135deg,#1a1a2a,#2a2a3a); border:3px solid #ff69b4;
                 border-radius:44px; padding:28px; text-align:center; z-index:400;
                 display:none; width:90%; max-width:320px; }
        .popup.show { display:block; }
        .popup p { color:#fff; font-size:15px; margin-bottom:8px; line-height:1.5; }
        .popup button { padding:11px 22px; margin:8px; border-radius:40px; font-weight:bold;
                        cursor:pointer; border:none; font-size:14px; font-family:'Courier New',monospace; }
    </style>
</head>
<body>

<!-- ════════════ TELA INICIAL ════════════ -->
<div id="startScreen" class="screen">
    <div class="card">
        <h1>👑 PRINCESA 👑</h1>
        <input type="text" id="playerName" placeholder="Seu nome" maxlength="15">
        <p style="color:#aaa;font-size:11px;margin:4px 0 0;">Seu código (fixo):</p>
        <div class="code-box"><span id="myCode">------</span></div>
        <button id="copyCodeBtn"   class="btn-orange">📋 COPIAR CÓDIGO</button>
        <button id="createRoomBtn" class="btn-green" >🎮 CRIAR SALA</button>
        <button id="joinRoomBtn"   class="btn-blue"  >🔗 ENTRAR EM SALA</button>
        <button id="soloBtn"       class="btn-yellow">🎮 JOGAR SOZINHO</button>
    </div>
</div>

<!-- ════════════ TELA: DIGITAR CÓDIGO ════════════ -->
<div id="joinCodeScreen" class="screen hidden">
    <div class="card">
        <h1>🔗 ENTRAR NA SALA</h1>
        <input type="text" id="roomCodeInput" placeholder="Código de 6 dígitos"
               maxlength="6" inputmode="numeric" pattern="[0-9]*">
        <br>
        <button id="confirmJoinBtn" class="btn-green">✅ ENTRAR</button>
        <button id="cancelJoinBtn"  class="btn-red"  >🔙 VOLTAR</button>
    </div>
</div>

<!-- ════════════ LOBBY ════════════ -->
<div id="lobbyScreen" class="screen hidden">
    <div class="card">
        <h1 id="lobbyTitle">👥 AGUARDANDO...</h1>
        <div class="code-box"><span id="lobbyCode">------</span></div>
        <div class="waiting-status" id="lobbyMsg">🟡 Aguardando...</div>
        <div id="lobbyConnected" style="color:#44ff44;margin:8px 0;font-size:13px;"></div>
        <!-- HOST vê este botão após guest confirmar -->
        <button id="startGameBtn"  class="btn-green" style="display:none;">▶ INICIAR JOGO</button>
        <!-- GUEST vê este botão ao entrar -->
        <button id="guestReadyBtn" class="btn-blue"  style="display:none;">✅ ESTOU PRONTO!</button>
        <button id="cancelRoomBtn" class="btn-red"   >🚪 CANCELAR</button>
    </div>
</div>

<!-- ════════════ POPUPS ════════════ -->
<div id="saveFriendPopup" class="popup">
    <p>Salvar <span id="saveFriendName" style="color:#ff69b4;font-weight:bold;font-size:18px;"></span> como amigo?</p>
    <button id="saveYesBtn" style="background:#44ff44;">✅ SIM</button>
    <button id="saveNoBtn"  style="background:#ff4444;color:#fff;">❌ NÃO</button>
</div>

<!-- ════════════ JOGO ════════════ -->
<button id="exitBtn">🚪 SAIR</button>
<div id="statusBar">🔌 Offline</div>

<div id="gameContainer" class="hidden">
    <div class="info-panel">
        <span>⭐ PRINCESA</span>
        <span id="ui_phase">FASE 1/33</span>
        <span id="ui_lives">💖 33</span>
        <span id="ui_att">🎲 3/3</span>
        <span>🍄 <span id="ui_score">0</span></span>
        <span>🪙 <span id="ui_coins">0</span></span>
        <span>🔥∞</span>
        <span id="ui_friend" style="color:#44ff44;display:none;"></span>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="touch-controls">
        <button id="btnLeft"  class="gbtn gbtn-lr">◀</button>
        <button id="btnRight" class="gbtn gbtn-lr">▶</button>
        <button id="btnJump"  class="gbtn gbtn-jump">⭐</button>
        <button id="btnFire"  class="gbtn gbtn-fire">🔥</button>
    </div>
    <div class="controls-footer">Toque nos botões · 🔥 Tocha infinita · Guardião: 50 tochas</div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  🔧 COLE SUA CHAVE API DO FIREBASE AQUI ABAIXO
//  Cole o objeto firebaseConfig completo conforme aparece
//  no console do Firebase (Configurações do projeto)
// ══════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAeRybVgZFjj6LhbPgYsVqpdl0eOIfVY5U",
  authDomain: "online-app-e95f6.firebaseapp.com",
  databaseURL: "https://online-app-e95f6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "online-app-e95f6",
  storageBucket: "online-app-e95f6.firebasestorage.app",
  messagingSenderId: "166050844176",
  appId: "1:166050844176:web:9ecee22f2ca3a703a78495"
};
// ══════════════════════════════════════════════════════════

// ── Firebase init ──────────────────────────────────────────
let db = null;
let multiplayerOK = false;
try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    multiplayerOK = true;
    setStatus('✅ Online', '#004400');
} catch(e) {
    setStatus('⚠️ Sem Firebase (solo)', '#442200');
}

function setStatus(msg, bg) {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    if (bg) el.style.background = bg;
}

// ── Utilitários de tela ────────────────────────────────────
function showScreen(id) {
    ['startScreen','joinCodeScreen','lobbyScreen'].forEach(s => {
        document.getElementById(s).classList.add('hidden');
    });
    if (id) document.getElementById(id).classList.remove('hidden');
}

// ── Código fixo do jogador ─────────────────────────────────
function getMyCode() {
    let c = localStorage.getItem('princesa_code');
    if (!c || c.length !== 6) {
        c = String(Math.floor(100000 + Math.random() * 900000));
        localStorage.setItem('princesa_code', c);
    }
    return c;
}
const MY_CODE = getMyCode();
document.getElementById('myCode').textContent = MY_CODE;

// Restaurar nome salvo
const savedName = localStorage.getItem('princesa_name') || '';
if (savedName) document.getElementById('playerName').value = savedName;
document.getElementById('playerName').addEventListener('input', function() {
    localStorage.setItem('princesa_name', this.value.trim());
});

// ── Estado multiplayer ─────────────────────────────────────
let roomRef = null, myPosRef = null, otherPosRef = null;
let isHost = false;
let currentRoom = null;
let otherName = null, otherId = null;
let gameStarted = false;
let remotePos = { x: 150, y: 370, fr: true };
window.isMP = false;
window.otherName = null;

// ── CRIAR SALA ─────────────────────────────────────────────
function createRoom() {
    const name = document.getElementById('playerName').value.trim();
    if (!name) { alert('Digite seu nome!'); return; }
    if (!multiplayerOK) { alert('Firebase não configurado. Use modo solo.'); return; }
    localStorage.setItem('princesa_name', name);

    const code = String(Math.floor(100000 + Math.random() * 900000));
    currentRoom = code; isHost = true; gameStarted = false;

    roomRef = db.ref('salas/' + code);
    roomRef.set({ host: MY_CODE, hostName: name, guestReady: false, go: false, t: Date.now() });

    // Ouvir guest
    roomRef.child('guest').on('value', snap => {
        const g = snap.val();
        if (g && g.id && g.id !== MY_CODE) {
            otherId = g.id; otherName = g.name;
            document.getElementById('lobbyConnected').textContent = '🎮 ' + otherName + ' entrou!';
            document.getElementById('lobbyMsg').textContent = 'Aguardando ' + otherName + ' clicar PRONTO...';
            setStatus('👥 ' + otherName + ' conectado', '#003300');
        }
    });
    // Ouvir guest pronto
    roomRef.child('guestReady').on('value', snap => {
        if (snap.val() === true && isHost && !gameStarted) {
            document.getElementById('lobbyMsg').textContent = '✅ ' + (otherName||'Convidado') + ' está pronto! Clique INICIAR.';
            document.getElementById('startGameBtn').style.display = 'inline-block';
        }
    });
    // Ouvir sinal de início
    roomRef.child('go').on('value', snap => {
        if (snap.val() === true && !gameStarted) launchGame();
    });

    document.getElementById('lobbyTitle').textContent = '🎮 SUA SALA';
    document.getElementById('lobbyCode').textContent = code;
    document.getElementById('lobbyMsg').textContent = 'Compartilhe o código: ' + code;
    document.getElementById('startGameBtn').style.display = 'none';
    document.getElementById('guestReadyBtn').style.display = 'none';
    showScreen('lobbyScreen');
    setStatus('🟡 Sala ' + code, '#333300');
}

// ── ENTRAR EM SALA ─────────────────────────────────────────
function joinRoom(code) {
    const name = document.getElementById('playerName').value.trim();
    if (!name) { alert('Digite seu nome!'); return; }
    if (!multiplayerOK) { alert('Firebase não configurado.'); return; }
    localStorage.setItem('princesa_name', name);

    currentRoom = code; isHost = false; gameStarted = false;
    roomRef = db.ref('salas/' + code);

    roomRef.once('value', snap => {
        const sala = snap.val();
        if (!sala) { alert('Sala não encontrada!'); showScreen('startScreen'); return; }
        otherId = sala.host; otherName = sala.hostName;

        roomRef.child('guest').set({ id: MY_CODE, name: name });

        document.getElementById('lobbyTitle').textContent = '🔗 CONECTADO';
        document.getElementById('lobbyCode').textContent = code;
        document.getElementById('lobbyConnected').textContent = '🎮 Host: ' + otherName;
        document.getElementById('lobbyMsg').textContent = 'Conectado! Clique PRONTO quando quiser começar.';
        document.getElementById('startGameBtn').style.display = 'none';
        document.getElementById('guestReadyBtn').style.display = 'inline-block';
        showScreen('lobbyScreen');
        setStatus('👥 Conectado a ' + otherName, '#003300');

        roomRef.child('go').on('value', snap => {
            if (snap.val() === true && !gameStarted) launchGame();
        });
    });
}

// Guest clica PRONTO
document.getElementById('guestReadyBtn').onclick = () => {
    if (!roomRef) return;
    roomRef.child('guestReady').set(true);
    document.getElementById('guestReadyBtn').style.display = 'none';
    document.getElementById('lobbyMsg').textContent = '⏳ Pronto! Aguardando host iniciar...';
    setStatus('⏳ Aguardando host...', '#003355');
};

// Host clica INICIAR
document.getElementById('startGameBtn').onclick = () => {
    if (isHost && roomRef) roomRef.child('go').set(true);
};

// ── INICIAR JOGO (multiplayer) ─────────────────────────────
function launchGame() {
    if (gameStarted) return;
    gameStarted = true;

    myPosRef    = roomRef.child('pos/' + MY_CODE);
    otherPosRef = roomRef.child('pos/' + otherId);
    myPosRef.set({ x: 150, y: 370, fr: true });

    otherPosRef.on('value', snap => {
        const d = snap.val();
        if (d) { remotePos.x = d.x || 150; remotePos.y = d.y || 370; remotePos.fr = d.fr !== false; }
    });

    window.isMP = true;
    window.otherName = otherName;
    document.getElementById('ui_friend').textContent = '👥 ' + otherName;
    document.getElementById('ui_friend').style.display = '';

    showScreen(null);
    document.getElementById('gameContainer').classList.remove('hidden');
    document.getElementById('exitBtn').style.display = 'block';
    setStatus('👥 Jogando com ' + otherName, '#003300');

    setTimeout(() => {
        document.getElementById('saveFriendName').textContent = otherName;
        document.getElementById('saveFriendPopup').classList.add('show');
    }, 3000);
}

// ── MODO SOLO ──────────────────────────────────────────────
function startSolo() {
    const name = document.getElementById('playerName').value.trim();
    if (!name) { alert('Digite seu nome!'); return; }
    localStorage.setItem('princesa_name', name);
    window.isMP = false; window.otherName = null;
    showScreen(null);
    document.getElementById('gameContainer').classList.remove('hidden');
    document.getElementById('exitBtn').style.display = 'block';
    setStatus('🎮 Solo', '#222233');
}

// ── SAIR ───────────────────────────────────────────────────
function exitGame() {
    if (roomRef) { if (isHost && currentRoom) db.ref('salas/' + currentRoom).remove(); roomRef.off(); roomRef = null; }
    gameStarted = false; window.isMP = false; window.otherName = null;
    document.getElementById('gameContainer').classList.add('hidden');
    document.getElementById('exitBtn').style.display = 'none';
    document.getElementById('ui_friend').style.display = 'none';
    document.getElementById('saveFriendPopup').classList.remove('show');
    showScreen('startScreen');
    setStatus('🔌 Offline', 'rgba(0,0,0,0.75)');
    if (typeof window.resetGame === 'function') window.resetGame();
}

// ── SALVAR AMIGO ───────────────────────────────────────────
document.getElementById('saveYesBtn').onclick = () => {
    const friends = JSON.parse(localStorage.getItem('princesa_friends') || '[]');
    if (otherName && !friends.find(f => f.name === otherName)) {
        friends.push({ name: otherName, code: otherId });
        localStorage.setItem('princesa_friends', JSON.stringify(friends));
        setStatus('✅ ' + otherName + ' salvo!', '#003300');
    }
    document.getElementById('saveFriendPopup').classList.remove('show');
};
document.getElementById('saveNoBtn').onclick = () => document.getElementById('saveFriendPopup').classList.remove('show');

// ── BOTÕES DE TELA ─────────────────────────────────────────
document.getElementById('copyCodeBtn').onclick   = () => { navigator.clipboard.writeText(MY_CODE).catch(()=>{}); setStatus('✅ Código copiado!', '#003300'); };
document.getElementById('createRoomBtn').onclick = createRoom;
document.getElementById('joinRoomBtn').onclick   = () => showScreen('joinCodeScreen');
document.getElementById('soloBtn').onclick       = startSolo;
document.getElementById('confirmJoinBtn').onclick = () => {
    const c = document.getElementById('roomCodeInput').value.trim();
    if (c.length !== 6) { alert('Código deve ter 6 dígitos!'); return; }
    joinRoom(c);
};
document.getElementById('cancelJoinBtn').onclick = () => showScreen('startScreen');
document.getElementById('cancelRoomBtn').onclick = exitGame;
document.getElementById('exitBtn').onclick       = exitGame;


// ══════════════════════════════════════════════════════════
//  MOTOR DO JOGO
// ══════════════════════════════════════════════════════════
(function GameEngine() {

    const canvas = document.getElementById('gameCanvas');

        const panelTop  = container.querySelector('.info-panel');

        // altura disponível = total - painel info - botões - footer

        canvas.width  = container.clientWidth  || window.innerWidth;
        canvas.height = Math.max(200, (window.innerHeight - usedH));
    }

    // Rodar resize quando o container fica visível e no resize de janela

    // ── ÁUDIO ─────────────────────────────────────────────
    let AC = null, musicGain = null, playing = false, audioON = false;
    let sIdx = 0, sTim = null;
    const TEMPO = 0.155;

        ["D#5",2],["R",1],["D5",2],["C5",4],
        ["C5",1],["G4",1],["E4",2],["A4",1],["B4",1],["A#4",1],["A4",2],["G4",2],
        ["E5",2],["G5",2],["A5",2],["F5",1],["G5",1],["E5",2],["C5",1],["D5",1],["B4",4],
        ["E5",1],["C5",1],["G4",2],["G4",1],["A4",1],["B4",2],["A4",1],["G4",1],["E4",3],
        ["G4",1],["C5",1],["E5",2],["G5",3],["C6",1],["G5",1],["E5",2],
        ["A5",1],["B5",1],["C6",4],["G5",1],["E5",1],["C5",4],
        ["C5",2],["G4",2],["E4",8]
    ];
    const NMAP = {"C":-9,"C#":-8,"D":-7,"D#":-6,"E":-5,"F":-4,"F#":-3,"G":-2,"G#":-1,"A":0,"A#":1,"B":2};
    function nFreq(n){ return 440*Math.pow(2,(NMAP[n.slice(0,-1)]+(+n.slice(-1)-4)*12)/12); }
    function initAC(){ if(AC)return; AC=new(window.AudioContext||window.webkitAudioContext)(); musicGain=AC.createGain(); musicGain.gain.value=0.28; musicGain.connect(AC.destination); }
    function playNote(n,t,d){ if(n==="R")return; const o=AC.createOscillator(),g=AC.createGain(); o.type="square"; o.frequency.value=nFreq(n)*0.65; g.gain.setValueAtTime(0.001,t); g.gain.exponentialRampToValueAtTime(0.22,t+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+d); o.connect(g); g.connect(musicGain); o.start(t); o.stop(t+d); }
    function songTick(){ if(!AC||!playing)return; if(sIdx>=SONG.length)sIdx=0; const[n,l]=SONG[sIdx++]; playNote(n,AC.currentTime,TEMPO*l); sTim=setTimeout(songTick,TEMPO*l*1000); }
    function startMusic(){ initAC(); if(AC.state==='suspended')AC.resume(); if(playing)return; playing=true; sIdx=0; songTick(); }
    function sfx(freq,type,dur,vol){ if(!AC||!audioON)return; const o=AC.createOscillator(),g=AC.createGain(); o.type=type; o.frequency.value=freq; g.gain.value=vol||0.22; o.connect(g); g.connect(AC.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur); o.stop(AC.currentTime+dur); }
    function enableAudio(){ if(audioON)return; audioON=true; startMusic(); }
    document.body.addEventListener('touchstart', enableAudio, {once:true, passive:true});
    document.body.addEventListener('click',      enableAudio, {once:true});

    // ── ESTADO ────────────────────────────────────────────
    let phase=1, score=0, coins=0, lives=33, att=3;
    let active=true, phDone=false, phTrans=false;
    let camX=0, worldW=11000;
    let respawn=false, respawnTX=0;
    let jumpAnim=0, legA=0;

    function mkP(){ return {x:150, y:GY()-38, w:34, h:38, vx:0, vy:0, onG:true, fr:true, inv:0}; }
    let P = mkP();

    let torches=[], plats=[], enems=[], coinsA=[], birds=[];
    let stars=[], shooting=[];
    let planet={x:0,y:0,r:80,c1:'#4a90d9',c2:'#1a407a',ring:false};
    let guard=null, mush=null;

    // ── CONTROLES ─────────────────────────────────────────
    let L=false, R=false, jumpQ=false;

    function mkBtn(id, down, up) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('mousedown',  e => { e.preventDefault(); down(); }, {passive:false});
        el.addEventListener('touchstart', e => { e.preventDefault(); down(); }, {passive:false});
        if (up) {
            el.addEventListener('mouseup',   e => { e.preventDefault(); up(); }, {passive:false});
            el.addEventListener('touchend',  e => { e.preventDefault(); up(); }, {passive:false});
            el.addEventListener('mouseleave',e => { up(); });
        }
    }
    mkBtn('btnLeft',  ()=>{ L=true;  }, ()=>{ L=false;  });
    mkBtn('btnRight', ()=>{ R=true;  }, ()=>{ R=false;  });
    mkBtn('btnJump',  ()=>{ jumpQ=true; }, null);
    mkBtn('btnFire',  ()=>{ throwTorch(); }, null);

    window.addEventListener('keydown', e => {
        if(e.key==='ArrowLeft')  { L=true;      e.preventDefault(); }
        if(e.key==='ArrowRight') { R=true;      e.preventDefault(); }
        if(e.key==='ArrowUp'||e.key===' ') { jumpQ=true; e.preventDefault(); }
        if(e.key==='z'||e.key==='Z') throwTorch();
    });
    window.addEventListener('keyup', e => {
        if(e.key==='ArrowLeft')  L=false;
        if(e.key==='ArrowRight') R=false;
    });

    // ── TOCHA ─────────────────────────────────────────────
    function throwTorch() {
        sfx(600,'sine',0.18);
        torches.push({ x:P.x+(P.fr?P.w+4:-18), y:P.y+P.h/2-6, vx:P.fr?9:-9, vy:-3, w:11, h:11 });
    }

    // ── BUILD FASE ────────────────────────────────────────
    function buildPhase(ph) {
        const GY_VAL = GY();
        worldW = 10000 + ph*1000;
        const COLS=[["#4a90d9","#1a407a"],["#ff6b6b","#8b0000"],["#e066ff","#5d008b"],["#3ae3b5","#0a5c43"],["#ffb347","#b85300"]];
        const c = COLS[ph % COLS.length];
        planet = { x:130+Math.random()*450, y:45+Math.random()*100, r:65+Math.random()*65, c1:c[0], c2:c[1], ring:ph%2===0 };

        stars   = Array.from({length:150}, ()=>({x:Math.random()*1300, y:Math.random()*canvas.height*0.75, s:Math.random()*2+0.5, a:Math.random(), sp:0.008+Math.random()*0.018}));
        shooting = [];

        guard = { x:worldW-200, y:GY_VAL-95, w:85, h:95, alive:true, hits:0, dir:-1, t:0 };
        mush  = ph>=8 ? { x:worldW-520, y:GY_VAL-65, w:40, h:40, done:false } : null;

        plats = [{ x:0, y:GY_VAL, w:worldW, h:30 }];
        for(let i=0;i<15+ph;i++){
            const px=300+i*380+ph*15, py=GY_VAL-50-(i%5)*38;
            if(px<worldW-260){ plats.push({x:px,y:py,w:78,h:22}); if(ph>10&&i%3===0) plats.push({x:px+72,y:py-46,w:66,h:22}); }
        }

        enems=[];
        for(let i=0;i<25+Math.floor(ph*1.8);i++){
            const ex=260+i*215+ph*10;
            if(ex<worldW-330) enems.push({x:ex,y:GY_VAL-34,alive:true,type:i%4,dir:i%2?1:-1,fr:0});
        }
        plats.forEach(pl => {
            if(pl.y < GY_VAL-30 && Math.random()>0.44)
                enems.push({x:pl.x+14,y:pl.y-32,alive:true,type:Math.random()*4|0,dir:Math.random()>.5?1:-1,fr:0});
        });

        coinsA=[];
        for(let i=0;i<250;i++){
            let cx=130+(i*47)%(worldW-220), cy=GY_VAL-60;
            if(i%3===0) cy=GY_VAL-100; if(i%5===0) cy=GY_VAL-148;
            coinsA.push({x:cx,y:cy,w:20,h:20,got:false});
        }

        birds = Array.from({length:10}, ()=>({x:Math.random()*(worldW+600),y:35+Math.random()*110,sp:0.5+Math.random()*0.7,wing:Math.random()*Math.PI*2,sz:4+Math.random()*4}));
    }

    // ── UI ────────────────────────────────────────────────
    function updateUI() {
        document.getElementById('ui_phase').textContent  = 'FASE '+phase+'/33';
        document.getElementById('ui_score').textContent  = score|0;
        document.getElementById('ui_coins').textContent  = coins;
        document.getElementById('ui_lives').textContent  = '💖 '+lives;
        document.getElementById('ui_att').textContent    = '🎲 '+att+'/3';
    }

    // ── VIDA ──────────────────────────────────────────────
    function loseLife(){
        sfx(200,'sawtooth',0.45,0.35);
        if(att>1){ att--; updateUI(); doRespawn(); }
        else { att=3; lives--; updateUI(); if(lives<=0){alert('💀 GAME OVER!'); exitGame();} else loadPhase(phase); }
    }
    function doRespawn(){ respawn=true; respawnTX=P.x; P.inv=80; P.x=80; P.vx=12; P.vy=0; }

    // ── COLISÃO ───────────────────────────────────────────
    function doCollide(e) {
        let grounded=false;
        for(const pl of plats){
            if(e.x+e.w>pl.x && e.x<pl.x+pl.w && e.y+e.h<=pl.y+14 && e.y+e.h+e.vy>=pl.y){
                e.y=pl.y-e.h; e.vy=0; grounded=true; break;
            }
        }
        e.onG = grounded;
        const GY_VAL = GY();
        if(e.y+e.h >= GY_VAL && !grounded){ e.y=GY_VAL-e.h; e.vy=0; e.onG=true; }
    }

    // ── GUARDIÃO ──────────────────────────────────────────
    function tickGuard(){
        if(!guard||!guard.alive) return;
        guard.t++; if(guard.t>55){guard.dir*=-1; guard.t=0;}
        guard.x+=guard.dir*0.7;
        guard.x=Math.max(worldW-290,Math.min(worldW-120,guard.x));
        if(P.x<guard.x+guard.w&&P.x+P.w>guard.x&&P.y<guard.y+guard.h&&P.y+P.h>guard.y)
            if(P.inv<=0&&!respawn) loseLife();
    }

    // ── TOCHAS ────────────────────────────────────────────
    function tickTorches(){
        for(let i=torches.length-1;i>=0;i--){
            const t=torches[i]; t.x+=t.vx; t.y+=t.vy; t.vy+=0.32;
            if(t.y>canvas.height+60||t.x<-200||t.x>worldW+200){torches.splice(i,1);continue;}
            if(guard&&guard.alive&&t.x<guard.x+guard.w&&t.x+t.w>guard.x&&t.y<guard.y+guard.h&&t.y+t.h>guard.y){
                guard.hits++; sfx(700,'sine',0.1); torches.splice(i,1);
                if(guard.hits>=50){guard.alive=false; score+=1000; updateUI();} continue;
            }
            for(let j=enems.length-1;j>=0;j--){
                const e=enems[j];
                if(e.alive&&t.x<e.x+32&&t.x+t.w>e.x&&t.y<e.y+32&&t.y+t.h>e.y){
                    e.alive=false; score+=50; updateUI(); torches.splice(i,1); break;
                }
            }
        }
    }

    // ── INIMIGOS ──────────────────────────────────────────
    function tickEnems(){
        if(respawn) return;
        for(const e of enems){
            if(!e.alive) continue;
            if(e.type===2||e.type===3){e.x+=e.dir*0.9; if(e.x<60||e.x>worldW-90)e.dir*=-1;}
            if(e.type===1) e.fr+=0.08;
            if(P.x<e.x+32&&P.x+P.w>e.x&&P.y<e.y+32&&P.y+P.h>e.y){
                if(P.vy>0&&P.y+P.h-P.vy<=e.y+12){e.alive=false;score+=100;updateUI();P.vy=-8;}
                else if(P.inv<=0){loseLife();break;}
            }
        }
    }

    // ── MOEDAS ────────────────────────────────────────────
    function tickCoins(){
        for(const c of coinsA){
            if(!c.got&&P.x<c.x+c.w&&P.x+P.w>c.x&&P.y<c.y+c.h&&P.y+P.h>c.y){
                c.got=true; coins++; score+=25; sfx(1046,'sine',0.14); updateUI();
            }
        }
    }

    // ── FASE COMPLETA ─────────────────────────────────────
    function checkEnd(){
        if(phDone||respawn||!active||phTrans) return;
        if(guard&&guard.alive) return;
        if(P.x+P.w>worldW-90){
            phDone=true; active=false; phTrans=true;
            [523,659,784,1047].forEach((f,i)=>setTimeout(()=>sfx(f,'square',0.3,0.18),i*110));
            setTimeout(()=>{
                if(phase<33){ phase++; att=3; loadPhase(phase); }
                else { alert('🏆 PARABÉNS! VOCÊ ZEROU O JOGO! 🏆'); exitGame(); }
            }, 600);
        }
    }

    // ── LOAD FASE ─────────────────────────────────────────
    function loadPhase(ph){
        phase=ph; buildPhase(ph);
        P=mkP(); camX=0; legA=0; jumpAnim=0;
        active=true; phDone=false; phTrans=false; respawn=false; torches=[];
        updateUI();
    }
    window.resetGame = () => { score=0; coins=0; lives=33; att=3; loadPhase(1); };

    // ── UPDATE ────────────────────────────────────────────
    function update(){
        if(!active||phDone) return;
        const GY_VAL = GY();
        const W = canvas.width, H = canvas.height;

        if(respawn){
            P.x+=P.vx; if(P.x>=respawnTX){P.x=respawnTX;P.vx=0;respawn=false;P.inv=50;}
            P.vy+=GRAV; P.y+=P.vy; if(P.y+P.h>=GY_VAL){P.y=GY_VAL-P.h;P.vy=0;}
            camX += (Math.max(0,Math.min(P.x+P.w/2-W/3.5,worldW-W))-camX)*0.09;
            return;
        }

        // Estrelas
        stars.forEach(s=>{ s.a+=s.sp; if(s.a>1||s.a<0)s.sp*=-1; });
        if(Math.random()>0.986&&shooting.length<3)
            shooting.push({x:Math.random()*W,y:-15,vx:-(2+Math.random()*4),vy:2+Math.random()*4,life:1});
        shooting.forEach((ss,i)=>{ ss.x+=ss.vx;ss.y+=ss.vy;ss.life-=0.016; if(ss.life<=0||ss.y>H)shooting.splice(i,1); });

        birds.forEach(b=>{ b.x+=b.sp; if(b.x>worldW+200)b.x=-150; b.wing+=0.15; });

        tickTorches(); tickGuard();

        // Pulo
        if(jumpQ && P.onG){ P.vy=JUMP_V; P.onG=false; jumpAnim=10; }
        jumpQ=false;

        // Movimento
        if(L){ P.vx=Math.max(-MAX_SPD,P.vx-ACC); P.fr=false; legA+=0.3; }
        if(R){ P.vx=Math.min( MAX_SPD,P.vx+ACC); P.fr=true;  legA+=0.3; }
        if(!L&&!R) P.vx*=FRIC;

        P.vy+=GRAV; P.x+=P.vx; P.y+=P.vy;
        P.x=Math.max(50,Math.min(P.x,worldW-P.w-50));
        doCollide(P);

        if(mush&&!mush.done&&P.x<mush.x+40&&P.x+P.w>mush.x&&P.y<mush.y+40&&P.y+P.h>mush.y){
            mush.done=true; score+=500; updateUI();
        }
        if(P.y+P.h>H+100) loseLife();
        tickEnems(); tickCoins(); checkEnd();
        if(P.inv>0) P.inv--;
        if(jumpAnim>0) jumpAnim--;
        camX += (Math.max(0,Math.min(P.x+P.w/2-canvas.width/3.5,worldW-canvas.width))-camX)*0.09;

        // Sincronizar multiplayer
        if(window.isMP && myPosRef && !respawn)
            myPosRef.set({x:P.x, y:P.y, fr:P.fr});
    }

    // ── RENDER ────────────────────────────────────────────
    function render(){
        const W=canvas.width, H=canvas.height;
        const GY_VAL=GY();
        const cx=camX;

        // Fundo
        const bg=ctx.createLinearGradient(0,0,0,H);
        bg.addColorStop(0,'#03020c'); bg.addColorStop(0.5,'#0b061a'); bg.addColorStop(1,'#170826');
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

        // Estrelas
        stars.forEach(s=>{ ctx.fillStyle=`rgba(255,255,255,${s.a.toFixed(2)})`; ctx.fillRect(s.x,s.y,s.s,s.s); });

        // Estrelas cadentes
        shooting.forEach(ss=>{
            ctx.save();
            const g2=ctx.createLinearGradient(ss.x,ss.y,ss.x-ss.vx*3,ss.y-ss.vy*3);
            g2.addColorStop(0,`rgba(255,220,100,${ss.life.toFixed(2)})`);
            g2.addColorStop(1,'rgba(255,0,0,0)');
            ctx.strokeStyle=g2; ctx.lineWidth=2.5;
            ctx.beginPath(); ctx.moveTo(ss.x,ss.y); ctx.lineTo(ss.x-ss.vx*3,ss.y-ss.vy*3); ctx.stroke();
            ctx.restore();
        });

        // Planeta
        const px2=planet.x-cx*0.05;
        if(px2+planet.r+20>0 && px2-planet.r-20<W){
            ctx.save();
            const pg=ctx.createRadialGradient(px2-planet.r/3,planet.y-planet.r/3,planet.r/12,px2,planet.y,planet.r);
            pg.addColorStop(0,planet.c1); pg.addColorStop(0.8,planet.c2); pg.addColorStop(1,'#020105');
            ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(px2,planet.y,planet.r,0,Math.PI*2); ctx.fill();
            if(planet.ring){
                ctx.strokeStyle='rgba(230,180,255,0.38)'; ctx.lineWidth=7;
                ctx.save(); ctx.translate(px2,planet.y); ctx.rotate(-0.25); ctx.scale(2,0.3);
                ctx.beginPath(); ctx.arc(0,0,planet.r+18,0,Math.PI*2); ctx.stroke(); ctx.restore();
            }
            ctx.restore();
        }

        // Montanhas
        ctx.fillStyle='#201236';
        for(let i=0;i<6;i++){
            const mx=(i*320)-(cx*0.1)%960;
            ctx.beginPath(); ctx.moveTo(mx,GY_VAL-40); ctx.lineTo(mx+80,GY_VAL-165); ctx.lineTo(mx+160,GY_VAL-40); ctx.fill();
        }

        // Chão
        ctx.fillStyle='#3a1e54'; ctx.fillRect(0,GY_VAL-12,W,H-GY_VAL+12);

        // Plataformas
        plats.forEach(pl=>{
            const dx=pl.x-cx; if(dx+pl.w<0||dx>W) return;
            ctx.fillStyle='#5c2d91'; ctx.fillRect(dx,pl.y,pl.w,pl.h);
            ctx.fillStyle='#431b6b'; ctx.fillRect(dx,pl.y+3,pl.w,5);
        });

        // Moedas
        const blink=(Date.now()/100|0)%2===0;
        coinsA.forEach(c=>{
            if(c.got) return; const dx=c.x-cx; if(dx+c.w<0||dx>W) return;
            ctx.fillStyle=blink?'#ffd700':'#ffaa00';
            ctx.beginPath(); ctx.arc(dx+c.w/2,c.y+c.h/2,c.w/2,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(dx+c.w/2-2,c.y+4,4,c.h-8);
        });

        // Inimigos
        enems.forEach(e=>{
            if(!e.alive) return; const dx=e.x-cx; if(dx+32<0||dx>W) return;
            ctx.fillStyle='#8b5a2b'; ctx.fillRect(dx,e.y,32,32);
            ctx.fillStyle='#593a18'; ctx.fillRect(dx+6,e.y+12,7,8); ctx.fillRect(dx+19,e.y+12,7,8);
            ctx.fillStyle='#000'; ctx.fillRect(dx+9,e.y+8,4,5); ctx.fillRect(dx+20,e.y+8,4,5);
        });

        // Pássaros
        birds.forEach(b=>{
            const dx=b.x-cx; if(dx<-60||dx>W+60) return;
            ctx.fillStyle='#a884e4'; ctx.beginPath(); ctx.ellipse(dx,b.y,b.sz,b.sz/1.5,0,0,Math.PI*2); ctx.fill();
            const wy=Math.sin(b.wing)>0?-4:3;
            ctx.fillStyle='#8250cc';
            ctx.beginPath(); ctx.moveTo(dx-b.sz,b.y); ctx.lineTo(dx-b.sz-5,b.y+wy); ctx.lineTo(dx-b.sz,b.y+1); ctx.fill();
            ctx.beginPath(); ctx.moveTo(dx+b.sz,b.y); ctx.lineTo(dx+b.sz+5,b.y+wy); ctx.lineTo(dx+b.sz,b.y+1); ctx.fill();
        });

        // Bandeira
        const fx=worldW-100-cx;
        if(fx+60>0&&fx<W){
            ctx.fillStyle='#b87a3a'; ctx.fillRect(fx,GY_VAL-130,8,130);
            ctx.fillStyle='#ff5533'; ctx.beginPath(); ctx.moveTo(fx+6,GY_VAL-130); ctx.lineTo(fx+55,GY_VAL-108); ctx.lineTo(fx+6,GY_VAL-86); ctx.fill();
            ctx.fillStyle='#ffdd99'; ctx.font='bold 18px monospace'; ctx.fillText('🏁',fx+18,GY_VAL-138);
        }

        // Cogumelo
        if(mush&&!mush.done){ const dx=mush.x-cx; if(dx+40>0&&dx<W){ ctx.fillStyle='#ff4444'; ctx.fillRect(dx,mush.y,40,40); ctx.fillStyle='#fff'; ctx.fillRect(dx+8,mush.y+8,24,24); ctx.fillStyle='#ffff00'; ctx.font='bold 11px monospace'; ctx.fillText('+500',dx+3,mush.y-6); } }

        // Guardião
        if(guard&&guard.alive){
            const dx=guard.x-cx;
            if(dx+90>-60&&dx<W+60){
                ctx.fillStyle='#8B0000'; ctx.fillRect(dx,guard.y,85,95);
                ctx.fillStyle='#AA0000'; ctx.fillRect(dx+10,guard.y+15,65,60);
                ctx.fillStyle='#660000'; ctx.beginPath(); ctx.ellipse(dx+42,guard.y+45,30,35,0,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='#FF0000';
                ctx.beginPath(); ctx.arc(dx+25,guard.y+40,10,0,Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(dx+60,guard.y+40,10,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='#000';
                ctx.beginPath(); ctx.arc(dx+23,guard.y+38,4,0,Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(dx+58,guard.y+38,4,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='#FF0000'; ctx.fillRect(dx+10,guard.y-15,65,8);
                ctx.fillStyle='#00FF00'; ctx.fillRect(dx+10,guard.y-15,65*Math.max(0,(50-guard.hits)/50),8);
                ctx.fillStyle='#fff'; ctx.font='bold 9px monospace'; ctx.fillText((50-guard.hits)+'hp',dx+28,guard.y-17);
            }
        }

        // Tochas
        torches.forEach(t=>{
            const dx=t.x-cx; if(dx+12<-50||dx>W+50) return;
            ctx.fillStyle='#ff6600'; ctx.fillRect(dx,t.y,t.w,t.h);
            ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.moveTo(dx+6,t.y-5); ctx.lineTo(dx+11,t.y); ctx.lineTo(dx,t.y); ctx.fill();
        });

        // Jogador remoto
        if(window.isMP && window.otherName){
            const rx=remotePos.x-cx, ry=remotePos.y;
            if(rx+34>0&&rx<W){
                ctx.fillStyle='#44aaff'; ctx.fillRect(rx,ry,34,38);
                ctx.fillStyle='#fec280'; ctx.fillRect(rx+6,ry+6,22,14);
                ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(rx+12,ry+12,3,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='#ff1493'; ctx.fillRect(rx+4,ry-5,28,9);
                ctx.fillStyle='#ffd700'; ctx.fillRect(rx+11,ry-13,14,8);
                ctx.fillStyle='#fff'; ctx.font='bold 9px monospace'; ctx.fillText(window.otherName,rx+2,ry-16);
            }
        }

        // Jogador principal
        if(!(P.inv>0 && (Date.now()/60|0)%3===0)){
            const x=P.x-cx, y=P.y;
            if(x+34>0&&x<W){
                ctx.fillStyle='#ff69b4'; ctx.fillRect(x,y,34,38);
                ctx.fillStyle='#fec280'; ctx.fillRect(x+6,y+6,22,14);
                ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(x+12,y+12,3,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+11,y+11,1.2,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='#1a1a1a'; ctx.fillRect(x+20,y+8,14,10);
                ctx.fillStyle='#c9a84c'; ctx.fillRect(x+22,y+10,10,6);
                ctx.beginPath(); ctx.arc(x+18,y+19,4,0,Math.PI); ctx.fillStyle='#cc6644'; ctx.fill();
                ctx.fillStyle='#5a2e0a'; ctx.fillRect(x+8,y+7,7,2);
                ctx.fillStyle='#ff1493'; ctx.fillRect(x+4,y-5,28,9);
                ctx.fillStyle='#fff'; ctx.fillRect(x+18,y-3,8,5);
                ctx.fillStyle='#ffb6c1'; ctx.fillRect(x+5,y+24,26,12);
                const lm=Math.sin(legA)*5;
                ctx.fillStyle='#ffb6c1';
                ctx.fillRect(x+5,y+32,7,7+(P.onG?lm:2));
                ctx.fillRect(x+22,y+32,7,7-(P.onG?lm:2));
                if(jumpAnim>0||!P.onG){ ctx.fillStyle='#fec280'; ctx.fillRect(x+26,y+8,6,8); ctx.fillRect(x+28,y+6,4,4); }
                ctx.fillStyle='#ffd700'; ctx.fillRect(x+11,y-12,14,8);
                for(let i=0;i<5;i++) ctx.fillRect(x+12+i*3,y-16,2,6);
                ctx.fillStyle='#ff4444'; ctx.fillRect(x+14,y-14,3,3);
                ctx.fillStyle='#44ff44'; ctx.fillRect(x+20,y-14,3,3);
                ctx.fillStyle='#4444ff'; ctx.fillRect(x+26,y-14,3,3);
                ctx.fillStyle='#ff00ff'; ctx.fillRect(x+17,y-17,4,5);
                const nm=document.getElementById('playerName').value.trim()||'Princesa';
                ctx.fillStyle='#fff'; ctx.font='bold 9px monospace'; ctx.fillText(nm,x+2,y-19);
            }
        }
    }

    // ── LOOP ──────────────────────────────────────────────
    function loop(){ update(); render(); requestAnimationFrame(loop); }

    loadPhase(1);
    loop();

})(); // fim GameEngine
</script>
</body>
</html>
